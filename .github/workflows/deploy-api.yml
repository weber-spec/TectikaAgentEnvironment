name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'src/api/**'
      - 'src/core/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  IMAGE_NAME:         agentteam-api
  CONTAINER_APP_NAME: ca-agentteam-api
  RESOURCE_GROUP:     rg-agentteam-dev-001

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "tag=${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        run: az acr login --name ${{ secrets.ACR_LOGIN_SERVER }}

      - name: Build and push image
        run: |
          docker build \
            -f src/api/Dockerfile \
            -t ${{ steps.tag.outputs.tag }} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest \
            .
          docker push ${{ steps.tag.outputs.tag }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      - name: Update Container App
        run: |
          az containerapp update \
            --name           ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image          ${{ steps.tag.outputs.tag }}
