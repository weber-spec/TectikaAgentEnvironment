name: Deploy Workflows

on:
  push:
    branches: [main]
    paths:
      - 'src/workflows/**'
      - 'src/core/**'
      - '.github/workflows/deploy-workflows.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

# FUNCTION_APP_NAME comes from the repo Variable set by infra/deploy.ps1.
env:
  DOTNET_VERSION: '9.0.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish and zip
        run: |
          dotnet publish src/workflows/TectikaAgents.Workflows.csproj \
            -c Release -o ./publish --no-self-contained
          cd ./publish && zip -r ../workflows-deploy.zip .

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Function App
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ vars.FUNCTION_APP_NAME }}
          package:  ./workflows-deploy.zip
